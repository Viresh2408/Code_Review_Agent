# ══════════════════════════════════════════════════════════════════════════════
#  AI Code Review Agent — Docker Compose (Phase 0)
#  Neo4j is intentionally absent — added in Phase 3.
#
#  Usage:
#    docker-compose up -d db redis chroma          # infrastructure only
#    docker-compose up -d                          # everything
#    docker-compose logs -f backend worker         # watch app logs
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 + TimescaleDB ─────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: codereview_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codereview}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run schema on first startup (idempotent — uses IF NOT EXISTS)
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codereview}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codereview_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (HTTP server mode) ──────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: codereview_chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codereview_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-codereview}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-codereview}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      # Mount secrets directory (contains GitHub App .pem key)
      - ./secrets:/app/secrets:ro
      # Hot-reload: mount source in dev
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codereview_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-codereview}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-codereview}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ./secrets:/app/secrets:ro
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q pr_review

  # ── vLLM serving service (Phase 6) ──────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: codereview_vllm
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - MODEL=/models/qwen2.5-coder-7b-instruct-quantized
    volumes:
      - ./models:/models
    # Note: GPU configuration can be added here if host system has Nvidia GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Prometheus (Metrics Scraping) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: codereview_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  # ── Grafana (Visualization Dashboard) ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: codereview_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards/code-review-agent.json:/etc/grafana/provisioning/dashboards/code-review-agent.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Loki (Log Storage) ──────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: codereview_loki
    restart: unless-stopped
    ports:
      - "3100:3100"

  # ── Promtail (Docker Logs Collector) ────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: codereview_promtail
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  pg_data:
  redis_data:
  chroma_data:
